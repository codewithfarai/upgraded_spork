name: ridebase_app
description: "RideBase — Ride-hailing for Zimbabwe"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.7.2

  # Map
  maplibre: ^0.3.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Networking
  dio: ^5.9.2

  # Auth (OAuth2/OIDC)
  flutter_appauth: ^7.0.1
  flutter_secure_storage: ^9.2.4

  # Typography
  google_fonts: ^6.2.1
  image_picker: ^1.2.2
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/styles/
