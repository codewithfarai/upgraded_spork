---
# Docker Swarm Bootstrap Playbook
# Installs Docker, initializes Swarm, joins nodes, and applies labels.
#
# Usage:
#   ENV=dev ansible-playbook playbooks/swarm.yml
#   make swarm ENV=dev

# ==============================================================================
# Play 1: Install Docker on all nodes
# ==============================================================================
- name: Install Docker on all Swarm nodes
  hosts: docker_nodes
  become: yes

  pre_tasks:
    - name: Verify connectivity to all nodes
      ping:

    - name: Wait for nodes to be ready
      wait_for_connection:
        timeout: 60

  tasks:
    - name: Install and configure Docker
      include_role:
        name: docker

  post_tasks:
    - name: Verify Docker installation
      command: docker --version
      register: docker_version_output
      changed_when: false
      failed_when: docker_version_output.rc != 0

    - name: Verify Docker Compose installation
      command: docker compose version
      register: compose_version_output
      changed_when: false
      failed_when: compose_version_output.rc != 0

    - name: Display Docker versions
      debug:
        msg:
          - "Docker: {{ docker_version_output.stdout }}"
          - "Docker Compose: {{ compose_version_output.stdout }}"

# ==============================================================================
# Play 2: Initialize Swarm on Manager-1
# ==============================================================================
- name: Initialize Swarm on primary manager
  hosts: managers[0]
  become: yes
  tasks:
    - name: Check Swarm status
      command: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
      register: swarm_status
      changed_when: false

    - name: Initialize Swarm
      command: >
        docker swarm init
        --advertise-addr {{ inventory_hostname }}
        --default-addr-pool 172.16.0.0/12
        --default-addr-pool-mask-length 24
      when: swarm_status.stdout == "inactive"
      register: swarm_init

    - name: Get Manager Join Token
      command: docker swarm join-token -q manager
      register: manager_token
      changed_when: false

    - name: Get Worker Join Token
      command: docker swarm join-token -q worker
      register: worker_token
      changed_when: false

# ==============================================================================
# Play 3: Join remaining Managers
# ==============================================================================
- name: Join remaining managers to Swarm
  hosts: managers:!managers[0]
  become: yes
  tasks:
    - name: Check Swarm status
      command: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
      register: swarm_status
      changed_when: false

    - name: Join Swarm as Manager
      command: >
        docker swarm join
        --token {{ hostvars[groups['managers'][0]]['manager_token'].stdout }}
        {{ hostvars[groups['managers'][0]]['inventory_hostname'] }}:2377
      when: swarm_status.stdout == "inactive"

# ==============================================================================
# Play 4: Join Workers, Edge, and Database nodes
# ==============================================================================
- name: Join worker nodes to Swarm
  hosts: workers:edge:database
  become: yes
  tasks:
    - name: Check Swarm status
      command: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
      register: swarm_status
      changed_when: false

    - name: Join Swarm as Worker
      command: >
        docker swarm join
        --token {{ hostvars[groups['managers'][0]]['worker_token'].stdout }}
        {{ hostvars[groups['managers'][0]]['inventory_hostname'] }}:2377
      when: swarm_status.stdout == "inactive"

# ==============================================================================
# Play 5: Apply node labels
# ==============================================================================
- name: Configure Swarm node labels
  hosts: managers[0]
  become: yes
  tasks:
    - name: Calculate expected node count
      set_fact:
        expected_node_count: "{{ groups['managers'] | length + groups['workers'] | length + groups['edge'] | length + groups['database'] | length }}"

    - name: Wait for all nodes to appear in Swarm
      shell: docker node ls --format '{{ "{{" }}.Hostname{{ "}}" }}' | wc -l
      register: swarm_node_count
      until: swarm_node_count.stdout | int >= expected_node_count | int
      retries: 30
      delay: 10
      changed_when: false

    - name: Label Edge nodes
      command: "docker node update --label-add role=edge {{ hostvars[item].ansible_facts['hostname'] }}"
      loop: "{{ groups['edge'] }}"
      when: groups['edge'] is defined
      changed_when: true
      register: label_edge
      until: label_edge is not failed
      retries: 10
      delay: 6

    - name: Label Database nodes
      command: "docker node update --label-add role=database {{ hostvars[item].ansible_facts['hostname'] }}"
      loop: "{{ groups['database'] }}"
      when: groups['database'] is defined
      changed_when: true
      register: label_database
      until: label_database is not failed
      retries: 10
      delay: 6

    - name: Label Worker nodes
      command: "docker node update --label-add role=worker {{ hostvars[item].ansible_facts['hostname'] }}"
      loop: "{{ groups['workers'] }}"
      when: groups['workers'] is defined
      changed_when: true
      register: label_workers
      until: label_workers is not failed
      retries: 10
      delay: 6

# ==============================================================================
# Play 6: Deploy Edge Load Balancer (Traefik) and Socket Proxy
# ==============================================================================
- name: Deploy Traefik and Socket Proxy
  hosts: edge,managers[0]
  become: yes
  tasks:
    - name: Configure Traefik and Socket Proxy
      include_role:
        name: traefik

# ==============================================================================
# Play 7: Deploy Authentik SSO
# ==============================================================================
- name: Deploy Database HA Stack
  hosts: database,managers[0]
  become: yes
  tasks:
    - name: Configure Database HA Stack
      include_role:
        name: database_ha

# ==============================================================================
# Play 8: Deploy Authentik SSO
# ==============================================================================
- name: Deploy Authentik SSO
  hosts: workers,managers[0]
  become: yes
  tasks:
    - name: Configure Authentik SSO
      include_role:
        name: authentik

# ==============================================================================
# Play 9: Deploy Payment Service
# ==============================================================================
- name: Deploy Payment Service
  hosts: managers[0]
  become: yes
  tasks:
    - name: Configure Payment Service
      include_role:
        name: payment_service
      when: payment_service_enabled | default(true) | bool

# ==============================================================================
# Play 10: Deploy Onboarding Service
# ==============================================================================
- name: Deploy Onboarding Service
  hosts: managers[0]
  become: yes
  tasks:
    - name: Configure Onboarding Service
      include_role:
        name: onboarding_service
      when: onboarding_service_enabled | default(true) | bool

# ==============================================================================
# Play 11: Deploy Admin / Fleet Service
# ==============================================================================
- name: Deploy Admin Service
  hosts: managers[0]
  become: yes
  tasks:
    - name: Configure Admin Service
      include_role:
        name: admin_service
      when: admin_service_enabled | default(true) | bool

# ==============================================================================
# Play 12: Deploy Map Service (OSRM + Martin)
# ==============================================================================
- name: Deploy Map Service
  hosts: managers[0]
  become: yes
  tasks:
    - name: Configure Map Service
      include_role:
        name: map_service
      when: map_service_enabled | default(true) | bool

# ==============================================================================
# Play 13: Deploy Standalone Monitoring on Bastion
# ==============================================================================
- name: Deploy Standalone Monitoring on Bastion
  hosts: bastion
  become: yes
  tasks:
    - name: Configure Standalone Monitoring
      include_tasks: ../roles/monitoring/tasks/standalone.yml

# ==============================================================================
# Play 14: Deploy Monitoring Stack
# ==============================================================================
- name: Deploy Monitoring Stack
  hosts: managers[0]
  become: yes
  tasks:
    - name: Configure Monitoring Stack
      include_role:
        name: monitoring
