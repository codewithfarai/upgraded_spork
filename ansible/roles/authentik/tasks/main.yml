---
# ===========================================================================
# Tasks that run on MANAGER[0] only
# ===========================================================================
- name: Run Swarm Manager specific tasks
  block:
    - name: Create Authentik stack directory
      file:
        path: /opt/docker/stacks/authentik/secrets
        state: directory
        mode: '0755'

    - name: Slurp database password
      slurp:
        src: /opt/docker/stacks/database_ha/secrets/authentik_db_password
      register: slurped_db_pass

    - name: Slurp Terraform API token
      slurp:
        src: /opt/docker/stacks/authentik/secrets/authentik_terraform_token
      register: slurped_tf_token
      ignore_errors: true

    # NEW: Grab the exact checksum of the file that database_ha created
    - name: Get database password file stats
      stat:
        path: /opt/docker/stacks/database_ha/secrets/authentik_db_password
      register: db_pass_stat

    - name: Generate Authentik secrets (if not already generated)
      set_fact:
        authentik_secret_key_generated: "{{ lookup('password', '/dev/null length=50 chars=ascii_letters,digits') }}"
        authentik_terraform_token_generated: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters,digits') }}"

    - name: Set effective secrets
      set_fact:
        effective_secret_key: "{{ authentik_secret_key | default(authentik_secret_key_generated, true) }}"
        effective_terraform_token: "{{ slurped_tf_token['content'] | b64decode if not slurped_tf_token.failed else authentik_terraform_token_generated }}"
        effective_db_password: "{{ slurped_db_pass['content'] | b64decode }}"
        authentik_full_domain: "{{ authentik_domain }}.{{ target_env + '.' if target_env != 'prod' else '' }}{{ domain_name }}"
        traefik_dashboard_domain: "traefik.{{ target_env + '.' if target_env != 'prod' else '' }}{{ domain_name }}"

    - name: Write Authentik secrets to secure files
      copy:
        content: "{{ item.value }}"
        dest: "/opt/docker/stacks/authentik/secrets/{{ item.name }}"
        mode: '0600'
      loop:
        - { name: 'authentik_secret_key', value: '{{ effective_secret_key }}' }
        - { name: 'authentik_terraform_token', value: '{{ effective_terraform_token }}' }
      no_log: true
      register: secret_files

    - name: Set secret hash facts
      set_fact:
        authentik_secret_key_hash: "{{ (secret_files.results | selectattr('item.name', 'equalto', 'authentik_secret_key') | first).checksum | default(effective_secret_key | hash('sha1')) | list | join('') | truncate(10, True, '') }}"
        # Guarantee the DB hash perfectly matches what Swarm has
        authentik_db_password_hash: "{{ db_pass_stat.stat.checksum | truncate(10, True, '') }}"

    - name: Generate Authentik stack definition
      template:
        src: authentik_stack.yml.j2
        dest: /opt/docker/stacks/authentik/docker-compose.yml
        mode: '0644'

    - name: Deploy Authentik stack
      command: docker stack deploy -c /opt/docker/stacks/authentik/docker-compose.yml authentik

    - name: Export Terraform API token locally for terraform consumption
      blockinfile:
        path: "{{ playbook_dir }}/../../terraform_authentik/terraform.tfvars"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - AUTHENTIK SSO"
        block: |
          authentik_url = "https://{{ authentik_full_domain }}"
          authentik_token = "{{ effective_terraform_token }}"
      delegate_to: localhost
      become: false

  when: "inventory_hostname == groups['managers'][0]"

# ===========================================================================
# Tasks that run on WORKERS to find the authentik container and inject token
# ===========================================================================
- name: Synchronize Terraform API token back to all workers
  set_fact:
    effective_terraform_token: "{{ hostvars[groups['managers'][0]]['effective_terraform_token'] | default('') }}"
  when: "inventory_hostname in groups['workers']"
  no_log: true

- name: Configure Authentik Terraform API token on Workers
  shell: |
    CONTAINER_ID=$(docker ps -q -f name=authentik_server | head -n 1)
    if [ -z "$CONTAINER_ID" ]; then
      echo "SKIPPED: Container not on this node."
      exit 0
    fi
    docker exec $CONTAINER_ID ak shell -c "from authentik.core.models import User, Token; \
    user = User.objects.get(username='akadmin'); \
    Token.objects.update_or_create(user=user, identifier='terraform-token', intent='api', defaults={'key': '{{ effective_terraform_token }}', 'expiring': False});"
  register: authentik_api_token_raw
  until: authentik_api_token_raw.rc == 0 or 'SKIPPED' in authentik_api_token_raw.stdout
  retries: 60
  delay: 10
  changed_when: "'SKIPPED' not in authentik_api_token_raw.stdout"
  when: "inventory_hostname in groups['workers'] and effective_terraform_token != ''"
  no_log: true
