---
# ===========================================================================
# Admin / Fleet Service Ansible Role
# Runs on managers[0] — deploys the admin service stack to Swarm
# ===========================================================================
- name: Run Admin Service deployment tasks
  block:
    - name: Create admin service stack directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/docker/stacks/admin_service
        - /opt/docker/stacks/admin_service/secrets

    # -----------------------------------------------------------------------
    # Secrets: Authentik API token + S3 Secret Key
    # -----------------------------------------------------------------------
    - name: Check for existing Authentik API token (admin)
      stat:
        path: /opt/docker/stacks/admin_service/secrets/authentik_api_token
      register: admin_authentik_token_stat

    - name: Check for existing S3 secret key (admin)
      stat:
        path: /opt/docker/stacks/admin_service/secrets/s3_secret_key
      register: admin_s3_secret_key_stat

    - name: Check for existing Admin DB password
      stat:
        path: /opt/docker/stacks/admin_service/secrets/admin_db_password
      register: admin_db_pass_stat

    - name: Slurp Authentik Terraform token
      slurp:
        src: /opt/docker/stacks/authentik/secrets/authentik_terraform_token
      register: slurped_authentik_tf

    - name: Set final Authentik API token (admin)
      set_fact:
        admin_effective_authentik_api_token: "{{ slurped_authentik_tf['content'] | b64decode }}"

    - name: Write Authentik API token (admin)
      copy:
        content: "{{ admin_effective_authentik_api_token }}"
        dest: /opt/docker/stacks/admin_service/secrets/authentik_api_token
        mode: '0600'
      when: admin_effective_authentik_api_token != ''
      no_log: true
      register: admin_authentik_token_file

    - name: Write S3 secret key (admin)
      copy:
        content: "{{ admin_service_s3_secret_key | default('mock-secret') }}"
        dest: /opt/docker/stacks/admin_service/secrets/s3_secret_key
        mode: '0600'
      when: not admin_s3_secret_key_stat.stat.exists or (admin_service_rotate_secrets | default(false) | bool)
      no_log: true
      register: admin_s3_secret_key_file

    - name: Write Admin DB password
      copy:
        content: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') if not admin_db_pass_stat.stat.exists else lookup('file', '/opt/docker/stacks/admin_service/secrets/admin_db_password') }}"
        dest: /opt/docker/stacks/admin_service/secrets/admin_db_password
        mode: '0600'
      when: not admin_db_pass_stat.stat.exists or (admin_service_rotate_secrets | default(false) | bool)
      no_log: true
      register: admin_db_pass_file

    # -----------------------------------------------------------------------
    # Read back secrets for hash computation
    # -----------------------------------------------------------------------
    - name: Get admin secret file stats
      stat:
        path: "/opt/docker/stacks/admin_service/secrets/{{ item }}"
      loop:
        - authentik_api_token
        - s3_secret_key
        - admin_db_password
      register: admin_secret_stats

    - name: Set admin secret hash facts
      set_fact:
        admin_authentik_api_token_hash: "{{ admin_secret_stats.results[0].stat.checksum | truncate(10, True, '') }}"
        admin_s3_secret_key_hash: "{{ admin_secret_stats.results[1].stat.checksum | truncate(10, True, '') }}"
        admin_db_password_hash: "{{ admin_secret_stats.results[2].stat.checksum | truncate(10, True, '') }}"

    # -----------------------------------------------------------------------
    # Resolve shared variables from other roles
    # -----------------------------------------------------------------------
    - name: Slurp RabbitMQ password from database_ha (admin)
      slurp:
        src: /opt/docker/stacks/database_ha/secrets/rabbitmq_password
      register: admin_slurped_rabbitmq_pass

    - name: Slurp PostgreSQL password from database_ha (admin)
      slurp:
        src: /opt/docker/stacks/database_ha/secrets/authentik_db_password
      register: admin_slurped_postgres_pass

    - name: Slurp Admin DB password
      slurp:
        src: /opt/docker/stacks/admin_service/secrets/admin_db_password
      register: admin_slurped_db_pass

    - name: Set effective variables (admin)
      set_fact:
        admin_effective_rabbitmq_password: "{{ admin_slurped_rabbitmq_pass['content'] | b64decode }}"
        admin_effective_postgres_password: "{{ admin_slurped_postgres_pass['content'] | b64decode }}"
        admin_effective_db_password: "{{ admin_slurped_db_pass['content'] | b64decode }}"
        authentik_full_domain: "{{ authentik_domain }}.{{ target_env + '.' if target_env != 'prod' else '' }}{{ domain_name }}"
        admin_service_full_domain: "{{ admin_service_domain }}.{{ target_env + '.' if target_env != 'prod' else '' }}{{ domain_name }}"

    # -----------------------------------------------------------------------
    # Database and User creation (Idempotent)
    # -----------------------------------------------------------------------
    - name: Ensure Admin database and user exist
      shell: |
        cat << 'EOF' | docker run -i --rm --network shared-backend -e PGPASSWORD="{{ admin_effective_postgres_password }}" -e PGSSLMODE=require postgres:16-alpine sh
        set -e
        # 1. Create admin user if not exists
        USER_EXISTS=$(psql -h db_ha_pgpool -U authentik -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='admin_fleet'")
        if [ "$USER_EXISTS" != "1" ]; then
          psql -h db_ha_pgpool -U authentik -d postgres -c "CREATE USER admin_fleet WITH PASSWORD '{{ admin_effective_db_password }}';"
        fi

        # 2. Grant the new role to the 'authentik' manager user
        psql -h db_ha_pgpool -U authentik -d postgres -c "GRANT admin_fleet TO authentik;"

        # 3. Create database if not exists
        DB_EXISTS=$(psql -h db_ha_pgpool -U authentik -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='admin_fleet'")
        if [ "$DB_EXISTS" != "1" ]; then
          psql -h db_ha_pgpool -U authentik -d postgres -c "CREATE DATABASE admin_fleet OWNER admin_fleet;"
        fi
        EOF
      register: admin_db_create_result
      until: admin_db_create_result.rc == 0
      retries: 5
      delay: 10
      changed_when: "'CREATE' in admin_db_create_result.stdout"

    # -----------------------------------------------------------------------
    # Generate and deploy stack
    # -----------------------------------------------------------------------
    - name: Generate admin service stack definition
      template:
        src: admin_service_stack.yml.j2
        dest: /opt/docker/stacks/admin_service/docker-compose.yml
        mode: '0644'

    - name: Deploy admin service stack
      command: docker stack deploy --with-registry-auth -c /opt/docker/stacks/admin_service/docker-compose.yml admin
      register: admin_deploy_result

    # -----------------------------------------------------------------------
    # Run Alembic migrations
    # -----------------------------------------------------------------------
    - name: Ensure lock directory exists for migration serialization
      file:
        path: /var/lock
        state: directory
        mode: '0755'

    - name: Run Admin Service database migrations
      shell: |
        set -euo pipefail

        # Serialize migrations on the manager host to avoid overlapping runs.
        flock -w 300 /var/lock/admin_migrations.lock \
          docker run --rm --network shared-backend --entrypoint alembic \
          -e DATABASE_URL="postgresql+asyncpg://admin_fleet:{{ admin_effective_db_password }}@db_ha_pgpool:5432/admin_fleet?ssl=require" \
          {{ admin_service_image }}:{{ admin_service_version }} \
          upgrade head
      args:
        executable: /bin/bash
      register: admin_migration_result
      until: admin_migration_result.rc == 0
      retries: 5
      delay: 15
      changed_when: "'Running upgrade' in admin_migration_result.stdout"

    - name: Wait for admin service to be healthy
      shell: |
        docker service ls --filter name=admin_admin_service --format '{{ "{{" }}.Replicas{{ "}}" }}'
      register: admin_service_status
      until: "admin_service_status.stdout.split('/')[0] | int >= 1"
      retries: 30
      delay: 10
      changed_when: false

  when: "inventory_hostname == groups['managers'][0]"
