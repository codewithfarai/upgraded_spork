---
- name: Create standalone monitoring directory
  file:
    path: /opt/docker/monitoring-standalone
    state: directory
    mode: '0755'

- name: Create standalone Promtail config
  template:
    src: ../templates/promtail_standalone.yml.j2
    dest: /opt/docker/monitoring-standalone/promtail.yml
  register: promtail_config

- name: Create standalone Docker Compose file
  copy:
    dest: /opt/docker/monitoring-standalone/docker-compose.yml
    content: |
      version: '3.8'
      services:
        node-exporter:
          image: prom/node-exporter:latest
          container_name: node-exporter
          volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
          command:
            - '--path.procfs=/host/proc'
            - '--path.sysfs=/host/sys'
            - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
          ports:
            - "9100:9100"
          restart: unless-stopped

        promtail:
          image: grafana/promtail:latest
          container_name: promtail
          volumes:
            - /var/log:/var/log:ro
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
            - /run/docker.sock:/run/docker.sock:ro
            - /opt/docker/monitoring-standalone/promtail.yml:/etc/promtail/config.yml:ro
          command:
            - -config.file=/etc/promtail/config.yml
            - -config.expand-env=true
          restart: unless-stopped

- name: Deploy standalone monitoring containers
  community.docker.docker_compose_v2:
    project_src: /opt/docker/monitoring-standalone
    state: present
