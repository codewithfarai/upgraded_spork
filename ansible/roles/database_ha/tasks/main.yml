---
# Identify which index (0, 1, 2) this specific database node represents
- name: Determine node index for volume mapping
  set_fact:
    node_index: "{{ groups['database'].index(inventory_hostname) }}"
  when: "'database' in group_names"

- name: Create Postgres directory for this node
  file:
    path: "/opt/docker/stacks/database_ha/postgres-{{ node_index }}"
    state: directory
    owner: '101'
    group: '101'
    mode: '0700'
  when: "'database' in group_names"

- name: Create Redis directory for this node
  file:
    path: "/opt/docker/stacks/database_ha/redis-{{ node_index }}"
    state: directory
    mode: '0777'
  when: "'database' in group_names"

- name: Create RabbitMQ directory for this node
  file:
    path: "/opt/docker/stacks/database_ha/rabbitmq-{{ node_index }}"
    state: directory
    owner: '999'
    group: '999'
    mode: '0700'
  when: "'database' in group_names"

# Execute Swarm deployment on the Manager
- name: Run Swarm Manager specific tasks
  block:
    - name: Create database stack directory
      file:
        path: /opt/docker/stacks/database_ha/secrets
        state: directory
        mode: '0755'

    - name: Check if DB password exists
      stat:
        path: /opt/docker/stacks/database_ha/secrets/authentik_db_password
      register: db_pass_stat

    - name: Check if Redis password exists
      stat:
        path: /opt/docker/stacks/database_ha/secrets/redis_password
      register: redis_pass_stat

    - name: Check if RabbitMQ password exists
      stat:
        path: /opt/docker/stacks/database_ha/secrets/rabbitmq_password
      register: rabbitmq_pass_stat

    - name: Slurp existing DB password
      slurp:
        src: /opt/docker/stacks/database_ha/secrets/authentik_db_password
      register: slurped_db_pass
      when: db_pass_stat.stat.exists

    - name: Slurp existing Redis password
      slurp:
        src: /opt/docker/stacks/database_ha/secrets/redis_password
      register: slurped_redis_pass
      when: redis_pass_stat.stat.exists

    - name: Slurp existing RabbitMQ password
      slurp:
        src: /opt/docker/stacks/database_ha/secrets/rabbitmq_password
      register: slurped_rabbitmq_pass
      when: rabbitmq_pass_stat.stat.exists

    - name: Generate new passwords if missing
      set_fact:
        new_db_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
        new_redis_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      when: not db_pass_stat.stat.exists or not redis_pass_stat.stat.exists

    - name: Set effective DB secret (re-use existing or generate)
      set_fact:
        effective_db_password: "{{ slurped_db_pass['content'] | b64decode if db_pass_stat.stat.exists else new_db_password }}"
        authentik_db_password: "{{ slurped_db_pass['content'] | b64decode if db_pass_stat.stat.exists else new_db_password }}"

    - name: Set effective Redis secret (re-use existing or generate)
      set_fact:
        effective_redis_password: "{{ slurped_redis_pass['content'] | b64decode if redis_pass_stat.stat.exists else new_redis_password }}"

    - name: Set effective RabbitMQ secret (re-use existing or generate)
      set_fact:
        effective_rabbitmq_password: "{{ slurped_rabbitmq_pass['content'] | b64decode if rabbitmq_pass_stat.stat.exists else lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

    - name: Write DB password to secret file
      copy:
        content: "{{ effective_db_password }}"
        dest: "/opt/docker/stacks/database_ha/secrets/authentik_db_password"
        mode: '0600'
      register: db_secret_file

    - name: Write Redis password to secret file
      copy:
        content: "{{ effective_redis_password }}"
        dest: "/opt/docker/stacks/database_ha/secrets/redis_password"
        mode: '0600'
      register: redis_secret_file

    - name: Write RabbitMQ password to secret file
      copy:
        content: "{{ effective_rabbitmq_password }}"
        dest: "/opt/docker/stacks/database_ha/secrets/rabbitmq_password"
        mode: '0600'
      register: rabbitmq_secret_file

    - name: Set secret hash fact
      set_fact:
        authentik_db_password_hash: "{{ db_secret_file.checksum | default(effective_db_password | hash('sha1')) | list | join('') | truncate(10, True, '') }}"
        redis_password_hash: "{{ redis_secret_file.checksum | default(effective_redis_password | hash('sha1')) | list | join('') | truncate(10, True, '') }}"
        rabbitmq_password_hash: "{{ rabbitmq_secret_file.checksum | default(effective_rabbitmq_password | hash('sha1')) | list | join('') | truncate(10, True, '') }}"

    - name: Create shared backend overlay network
      shell: |
        docker network create --driver overlay --attachable --scope swarm --subnet 172.21.0.0/24 --opt encrypted=true shared-backend || true
      register: network_create
      changed_when: "'created' in network_create.stdout|lower"

    - name: Generate Database HA stack definition
      template:
        src: database_stack.yml.j2
        dest: /opt/docker/stacks/database_ha/docker-compose.yml
        mode: '0644'

    - name: Deploy Database HA stack
      command: docker stack deploy -c /opt/docker/stacks/database_ha/docker-compose.yml db_ha

    - name: Wait for PostgreSQL Master to be ready via pgpool
      command: >
        docker run --rm --network shared-backend
        -e PGPASSWORD="{{ effective_db_password }}"
        postgres:16-alpine
        pg_isready -h db_ha_pgpool -U postgres -d postgres -t 10
      register: pg_ready
      until: pg_ready.rc == 0
      retries: 15
      delay: 10
      changed_when: false
      no_log: true

    - name: Ensure Authentik database exists idempotently
      shell: |
        cat << 'EOF' | docker run -i --rm --network shared-backend -e PGPASSWORD="{{ effective_db_password }}" -e PGSSLMODE=require postgres:16-alpine sh
        set -e
        # Note: We connect as authentik because Spilo secures the postgres user with a randomly generated root password
        EXISTS=$(psql -h db_ha_pgpool -U authentik -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='authentik'")
        if [ "$EXISTS" != "1" ]; then
          psql -h db_ha_pgpool -U authentik -d postgres -c "CREATE DATABASE authentik OWNER authentik;"
        fi
        EOF
      register: db_create_result
      until: db_create_result.rc == 0
      retries: 10
      delay: 10
      changed_when: "'CREATE DATABASE' in db_create_result.stdout"
      no_log: true


  when: "inventory_hostname == groups['managers'][0]"

- name: Synchronize RabbitMQ secrets to database nodes
  set_fact:
    effective_rabbitmq_password: "{{ hostvars[groups['managers'][0]]['effective_rabbitmq_password'] | default(omit) }}"
    effective_rabbitmq_user: "admin"
  when: "'database' in group_names"
  no_log: true

- name: Sync RabbitMQ configuration to database nodes
  template:
    src: "{{ item.src }}"
    dest: "/opt/docker/stacks/database_ha/rabbitmq-{{ node_index }}/{{ item.dest }}"
    owner: '999'
    group: '999'
    mode: '0600'
  loop:
    - { src: rabbitmq.conf.j2, dest: rabbitmq.conf }
    - { src: enabled_plugins.j2, dest: enabled_plugins }
  vars:
    rabbitmq_user: "{{ effective_rabbitmq_user }}"
    rabbitmq_password: "{{ effective_rabbitmq_password }}"
    db_count: "{{ groups['database'] | length }}"
  when: "'database' in group_names"
