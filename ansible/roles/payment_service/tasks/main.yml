---
# ===========================================================================
# Payment Service Ansible Role
# Runs on managers[0] — deploys the payment service stack to Swarm
# ===========================================================================
- name: Run Payment Service deployment tasks
  block:
    - name: Create payment service stack directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/docker/stacks/payment_service
        - /opt/docker/stacks/payment_service/secrets

    # -----------------------------------------------------------------------
    # Secrets: Stripe + Authentik API token
    # -----------------------------------------------------------------------
    - name: Check for existing Stripe secret key
      stat:
        path: /opt/docker/stacks/payment_service/secrets/stripe_secret_key
      register: stripe_key_stat

    - name: Check for existing Stripe webhook secret
      stat:
        path: /opt/docker/stacks/payment_service/secrets/stripe_webhook_secret
      register: stripe_webhook_stat

    - name: Check for existing Authentik API token
      stat:
        path: /opt/docker/stacks/payment_service/secrets/authentik_api_token
      register: authentik_token_stat

    - name: Write Stripe secret key
      copy:
        content: "{{ stripe_secret_key }}"
        dest: /opt/docker/stacks/payment_service/secrets/stripe_secret_key
        mode: '0600'
      when: not stripe_key_stat.stat.exists or (payment_service_rotate_secrets | default(false) | bool)
      no_log: true
      register: stripe_key_file

    - name: Write Stripe webhook secret
      copy:
        content: "{{ stripe_webhook_secret }}"
        dest: /opt/docker/stacks/payment_service/secrets/stripe_webhook_secret
        mode: '0600'
      when: not stripe_webhook_stat.stat.exists or (payment_service_rotate_secrets | default(false) | bool)
      no_log: true
      register: stripe_webhook_file

    - name: Write Authentik API token
      copy:
        content: "{{ payment_service_authentik_api_token }}"
        dest: /opt/docker/stacks/payment_service/secrets/authentik_api_token
        mode: '0600'
      when: not authentik_token_stat.stat.exists or (payment_service_rotate_secrets | default(false) | bool)
      no_log: true
      register: authentik_token_file

    # -----------------------------------------------------------------------
    # Read back secrets for hash computation
    # -----------------------------------------------------------------------
    - name: Get secret file stats
      stat:
        path: "/opt/docker/stacks/payment_service/secrets/{{ item }}"
      loop:
        - stripe_secret_key
        - stripe_webhook_secret
        - authentik_api_token
      register: secret_stats

    - name: Set secret hash facts
      set_fact:
        stripe_secret_key_hash: "{{ secret_stats.results[0].stat.checksum | truncate(10, True, '') }}"
        stripe_webhook_secret_hash: "{{ secret_stats.results[1].stat.checksum | truncate(10, True, '') }}"
        authentik_api_token_hash: "{{ secret_stats.results[2].stat.checksum | truncate(10, True, '') }}"

    # -----------------------------------------------------------------------
    # Resolve shared variables from other roles
    # -----------------------------------------------------------------------
    - name: Slurp RabbitMQ password from database_ha
      slurp:
        src: /opt/docker/stacks/database_ha/secrets/rabbitmq_password
      register: slurped_rabbitmq_pass

    - name: Set effective variables
      set_fact:
        effective_rabbitmq_password: "{{ slurped_rabbitmq_pass['content'] | b64decode }}"
        authentik_full_domain: "{{ authentik_domain }}.{{ target_env + '.' if target_env != 'prod' else '' }}{{ domain_name }}"
        payment_service_full_domain: "{{ payment_service_domain }}.{{ target_env + '.' if target_env != 'prod' else '' }}{{ domain_name }}"

    # -----------------------------------------------------------------------
    # Generate and deploy stack
    # -----------------------------------------------------------------------
    - name: Generate payment service stack definition
      template:
        src: payment_service_stack.yml.j2
        dest: /opt/docker/stacks/payment_service/docker-compose.yml
        mode: '0644'

    - name: Deploy payment service stack
      command: docker stack deploy --with-registry-auth -c /opt/docker/stacks/payment_service/docker-compose.yml payment
      register: deploy_result

    - name: Wait for payment service to be healthy
      shell: |
        docker service ls --filter name=payment_payment_service --format '{{ "{{" }}.Replicas{{ "}}" }}'
      register: service_status
      until: "service_status.stdout.split('/')[0] | int >= 1"
      retries: 30
      delay: 10
      changed_when: false

  when: "inventory_hostname == groups['managers'][0]"
