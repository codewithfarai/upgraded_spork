---
# Docker CE Installation Role
# Installs Docker CE and Docker Compose plugin from the official Docker APT repository

- name: Install prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Add Docker APT repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | \
    tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Configure Docker daemon for log rotation and Hetzner MTU
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "mtu": 1450,
        "iptables": true,
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
  notify: Restart Docker

- name: Enable and start Docker service
  systemd:
    name: docker
    enabled: yes
    state: started
    daemon_reload: yes

- name: Ensure Docker is running
  command: docker info
  changed_when: false
  register: docker_info
  retries: 3
  delay: 5
  until: docker_info.rc == 0

- name: Add weekly Docker image prune cron job
  ansible.builtin.cron:
    name: "Docker Weekly Image Prune"
    minute: "0"
    hour: "3"
    day: "*"
    month: "*"
    weekday: "0"
    job: "/usr/bin/docker image prune -a -f --filter \"until=168h\""
