---
# Docker CE Installation Role
# Installs Docker CE and Docker Compose plugin from the official Docker APT repository

# Repair broken Hetzner Nuremberg (nbg1) DNS override right now
- name: Guarantee /etc/resolv.conf symlink to systemd-resolved (Repair nbg1 datacenter)
  file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: yes

- name: Force systemd-resolved to use our verified fallback servers
  copy:
    dest: /etc/systemd/resolved.conf.d/99-hetzner-dns.conf
    content: |
      [Resolve]
      DNS=185.12.64.2 185.12.64.1 8.8.8.8
      FallbackDNS=1.1.1.1 8.8.4.4
  register: dns_fix

- name: Restart systemd-resolved if DNS config changed
  systemd:
    name: systemd-resolved
    state: restarted
  when: dns_fix.changed

- name: Wait 5 seconds for systemd-resolved to stabilize
  pause:
    seconds: 5
  when: dns_fix.changed

- name: Install prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
    cache_valid_time: 3600
  register: apt_prereqs
  until: apt_prereqs is not failed
  retries: 5
  delay: 10

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: false
  register: gpg_result
  until: gpg_result is not failed
  retries: 5
  delay: 10

- name: Add Docker APT repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | \
    tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Refresh apt cache (ensures Docker repo is indexed)
  apt:
    update_cache: yes
  register: apt_cache
  until: apt_cache is not failed
  retries: 5
  delay: 10

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  register: apt_install
  until: apt_install is not failed
  retries: 5
  delay: 10

- name: Configure Docker daemon for log rotation and Hetzner MTU
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "mtu": 1450,
        "iptables": true,
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
  notify: Restart Docker

- name: Enable and start Docker service
  systemd:
    name: docker
    enabled: yes
    state: started
    daemon_reload: yes

- name: Ensure Docker is running
  command: docker info
  changed_when: false
  register: docker_info
  retries: 3
  delay: 5
  until: docker_info.rc == 0

- name: Add weekly Docker image prune cron job
  ansible.builtin.cron:
    name: "Docker Weekly Image Prune"
    minute: "0"
    hour: "3"
    day: "*"
    month: "*"
    weekday: "0"
    job: "/usr/bin/docker image prune -a -f --filter \"until=168h\""

- name: Log in to Docker Hub to avoid pull rate limits
  community.docker.docker_login:
    username: "{{ lookup('env', 'DOCKERHUB_USERNAME') }}"
    password: "{{ lookup('env', 'DOCKERHUB_TOKEN') }}"
    registry_url: "https://index.docker.io/v1/"
  when:
    - lookup('env', 'DOCKERHUB_USERNAME') != ''
    - lookup('env', 'DOCKERHUB_TOKEN') != ''
  no_log: true
