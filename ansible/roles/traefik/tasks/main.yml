---
# Traefik Role
# Sets up Traefik in the Docker Swarm cluster along with a secure Socket Proxy

# ===========================================================================
# Tasks that run on EDGE nodes only (where Traefik containers actually run)
# ===========================================================================
- name: Create Traefik directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "1000"
    group: "1000"
  loop:
    - /opt/docker/stacks/traefik
    - /opt/docker/stacks/traefik/data
    - /opt/docker/stacks/traefik/data/dynamic
    - /opt/docker/stacks/traefik/logs
  when: "'edge' in group_names"



# ACME file creation removed - handled by LB

# ===========================================================================
# Tasks that run on MANAGER[0] only (Swarm control plane commands)
# ===========================================================================
- name: Create Traefik stack directory on manager
  file:
    path: /opt/docker/stacks/traefik
    state: directory
    mode: '0755'
  when: "inventory_hostname == groups['managers'][0]"

- name: Run Swarm Manager specific tasks
  block:
    - name: Set Traefik Domain fact
      set_fact:
        traefik_domain: "traefik.{{ target_env + '.' if target_env != 'prod' else '' }}{{ domain_name }}"

    - name: Sync dynamic routing configuration
      template:
        src: traefik_dynamic.yml.j2
        dest: /opt/docker/stacks/traefik/dynamic.yml
        mode: '0644'
      register: dynamic_sync_result

    - name: Sync main Traefik static configuration
      template:
        src: traefik_static.yml.j2
        dest: /opt/docker/stacks/traefik/traefik.yml
        mode: '0644'
      register: static_sync_result

    - name: Set config hashes
      set_fact:
        traefik_dynamic_config_hash: "{{ dynamic_sync_result.checksum | default('0') | truncate(10, True, '') }}"
        traefik_static_config_hash: "{{ static_sync_result.checksum | default('0') | truncate(10, True, '') }}"

    - name: Generate Traefik stack definition
      template:
        src: traefik_stack.yml.j2
        dest: /opt/docker/stacks/traefik/docker-compose.yml
        mode: '0644'
      register: stack_def_result

    - name: Create encrypted traefik-public overlay network
      shell: |
        docker network create --driver overlay --attachable --scope swarm --subnet 172.20.0.0/24 --opt com.docker.network.driver.mtu=1400 --opt encrypted=true traefik-public || true
      register: network_create_result
      changed_when: "'created' in network_create_result.stdout|lower"

    - name: Deploy Traefik and Socket Proxy stack
      command: docker stack deploy --with-registry-auth -c /opt/docker/stacks/traefik/docker-compose.yml traefik

  when: "inventory_hostname == groups['managers'][0]"
