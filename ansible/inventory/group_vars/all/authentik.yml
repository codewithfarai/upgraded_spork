# Authentik SSO Configuration

# Authentik version (pinned for reproducibility)
authentik_version: "2026.2.1"

# Domain prefix — results in auth.dev.ridebase.tech (dev) or auth.ridebase.tech (prod)
authentik_domain: "auth"

# Runtime secrets — loaded from ansible/.env via the Makefile (make swarm).
# AUTHENTIK_SECRET_KEY must be stable across redeploys (signs all sessions).
#
# AUTHENTIK_DB_PASSWORD is NOT loaded here. It is auto-generated on first run
# by the database_ha role and persisted to disk. The authentik role then slurps
# it from /opt/docker/stacks/database_ha/secrets/authentik_db_password.
authentik_secret_key: "{{ lookup('env', 'AUTHENTIK_SECRET_KEY') }}"
resend_api_key: "{{ lookup('env', 'RESEND_API_KEY') }}"
# HA Configuration — number of replicas for server and worker
authentik_server_replicas: 2
authentik_worker_replicas: 2
