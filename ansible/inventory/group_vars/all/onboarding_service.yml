# Onboarding Service Configuration

# Set to false to skip deployment (e.g. fresh cluster before Authentik token exists)
onboarding_service_enabled: true

# Docker image — push to Docker Hub under your account
# e.g. docker build -t fwande/ridebase-onboarding-service:0.1.0 .
onboarding_service_image: "{{ lookup('env', 'ONBOARDING_SERVICE_IMAGE') | default('fwande/ridebase_onboarding_service', true) }}"
onboarding_service_version: "{{ lookup('env', 'ONBOARDING_SERVICE_VERSION') | default('latest', true) }}"

# Domain prefix — results in onboarding.dev.ridebase.tech (dev) or onboarding.ridebase.tech (prod)
onboarding_service_domain: "onboarding"

# Replicas
onboarding_service_replicas: 2

# Database connection (Postgres via database_ha pgpool)
onboarding_service_db_name: "onboarding"
onboarding_service_db_user: "onboarding"

# Resend API key for OTP email verification
onboarding_service_resend_api_key: "{{ lookup('env', 'RESEND_API_KEY') }}"

# S3 / Hetzner Object Storage for driver license uploads
onboarding_service_s3_endpoint_url: "{{ lookup('env', 'S3_ENDPOINT_URL') }}"
onboarding_service_s3_access_key: "{{ lookup('env', 'S3_ACCESS_KEY') }}"
onboarding_service_s3_secret_key: "{{ lookup('env', 'S3_SECRET_KEY') }}"
onboarding_service_s3_bucket_name: "{{ lookup('env', 'S3_BUCKET_NAME') | default('ridebase-driver-docs', true) }}"
onboarding_service_s3_region_name: "{{ lookup('env', 'S3_REGION_NAME') | default('eu-central', true) }}"
