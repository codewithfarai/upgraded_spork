[defaults]
inventory = inventory/terraform_inventory.sh
roles_path = roles
remote_user = provision
host_key_checking = True
timeout = 30
forks = 10

# Performance
pipelining = True
gather_facts = True

# Output
stdout_callback = ansible.builtin.default
callbacks_enabled = ansible.builtin.profile_tasks

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[callback_default]
result_format = yaml

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
