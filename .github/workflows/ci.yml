name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    # This runs every step below INSIDE the tool-rich container
    container:
      image: ghcr.io/antonbabenko/pre-commit-terraform:v1.96.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # TFLint needs its plugins initialized once (like terraform init)
      - name: TFLint Init
        run: tflint --init

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        # We run 'pre-commit' directly because it's the container's entrypoint
        run: pre-commit run --all-files
