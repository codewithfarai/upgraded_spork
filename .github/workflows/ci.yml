name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    # Using the official image with all binaries (Terraform, TFLint, Trivy)
    container:
      image: ghcr.io/antonbabenko/pre-commit-terraform:v1.96.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Fixes the "git failed" FatalError by trusting the workspace
      - name: Fix git permissions
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Pre-download TFLint plugins so the hook doesn't fail/slow down
      - name: TFLint Init
        run: tflint --init

      # Caches the hooks (Trivy DB, TFLint plugins, etc.) to speed up runs
      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        # We run directly; no 'poetry run' needed as pre-commit is in the $PATH
        run: pre-commit run --all-files
