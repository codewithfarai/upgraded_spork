name: Bump version and create release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  bump-version:
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --only dev

    - name: Configure Git
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Detect changed paths
      id: changes
      run: |
        set -euo pipefail

        CHANGED_FILES="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"

        ROOT_CHANGED=false
        ONBOARDING_CHANGED=false
        PAYMENT_CHANGED=false

        if echo "$CHANGED_FILES" | grep -qE '^ride_base/onboarding_service/'; then
          ONBOARDING_CHANGED=true
        fi

        if echo "$CHANGED_FILES" | grep -qE '^ride_base/payment_service/'; then
          PAYMENT_CHANGED=true
        fi

        if echo "$CHANGED_FILES" | grep -qEv '^(ride_base/onboarding_service/|ride_base/payment_service/)'; then
          ROOT_CHANGED=true
        fi

        echo "root_changed=$ROOT_CHANGED" >> "$GITHUB_OUTPUT"
        echo "onboarding_changed=$ONBOARDING_CHANGED" >> "$GITHUB_OUTPUT"
        echo "payment_changed=$PAYMENT_CHANGED" >> "$GITHUB_OUTPUT"

    - name: Bump root version
      if: steps.changes.outputs.root_changed == 'true'
      run: |
        poetry run cz bump --changelog --yes || echo "Root: Nothing to bump"

    - name: Bump onboarding_service
      if: steps.changes.outputs.onboarding_changed == 'true'
      run: |
        poetry run cz --config ride_base/onboarding_service/pyproject.toml bump --changelog --yes || echo "Onboarding Service: Nothing to bump"

    - name: Bump payment_service
      if: steps.changes.outputs.payment_changed == 'true'
      run: |
        poetry run cz --config ride_base/payment_service/pyproject.toml bump --changelog --yes || echo "Payment Service: Nothing to bump"

    - name: Push changes
      run: |
        git push origin main
        git push origin --tags
